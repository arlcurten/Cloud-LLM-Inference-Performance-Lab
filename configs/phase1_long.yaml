# Long workload: ~523 input tokens, 100 requested output tokens
model_id: google/gemma-3-1b-it
model_dir: models/google/gemma-3-1b-it
device: cuda
dtype: float16
prompt: "You are a senior machine learning engineer at a large technology company. Your team has been asked to design a production-grade recommendation system for an e-commerce platform that currently serves ten million daily active users across multiple product categories including electronics, clothing, furniture, books, and sporting goods. The existing system is a simple collaborative filtering algorithm based on user purchase history. Business stakeholders have reported three major limitations with the current approach. First, new users who have not yet made any purchases receive poor recommendations because the system has no behavioral data for them, which is the classic cold-start problem. Second, the recommendations adapt slowly when individual users significantly change their purchasing interests over time. Third, the system consistently fails to surface niche or long-tail products even when those products would be highly relevant to specific user segments. Your team is proposing to replace the current system with a deep learning architecture. The proposed system consists of four main components. The first is a two-tower neural network that learns separate embedding representations for users and items. The user tower takes as input recent interaction history, demographic features, and contextual signals such as time of day and device type. The item tower takes product category, price, textual description embeddings from a pretrained language model, and historical engagement statistics. The second component is a real-time feature pipeline that processes user click streams, add-to-cart events, dwell time, and purchase confirmations at low latency. The third component is a candidate generation stage that uses approximate nearest neighbor search over the learned embedding space to retrieve the top one thousand candidate items. The fourth component is a ranking model that scores those candidates and returns the top twenty recommendations to the user interface. Your team is evaluating two candidate architectures for the ranking model. The first is a wide and deep network that combines a linear model with a deep neural network to capture both memorization of frequent co-occurrence patterns and generalization to new combinations. The second is a transformer-based sequential model that treats the user's interaction history as a sequence of tokens and uses self-attention to capture temporal dependencies between items the user has engaged with. Both architectures will be evaluated on offline metrics including normalized discounted cumulative gain and mean average precision. Online evaluation will use an A over B test measuring click-through rate, add-to-cart rate, and revenue per session. Your inference latency budget for the ranking stage is fifty milliseconds at the ninety-fifth percentile. Describe the key trade-offs between the two candidate architectures in terms of model capacity, training data requirements, inference latency, and interpretability. Then make a specific recommendation and justify your choice."
max_new_tokens: 100
warmup_iterations: 3
measurement_iterations: 10
batch_size: 1
do_sample: false
seed: 42
